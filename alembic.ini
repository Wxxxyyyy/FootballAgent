# Alembic 数据库迁移配置

[alembic]
script_location = backend/migrations
prepend_sys_path = .

# 数据库连接（实际使用时从 .env 读取，此处为模板）
sqlalchemy.url = mysql+aiomysql://root:football123@127.0.0.1:3306/football_agent

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

