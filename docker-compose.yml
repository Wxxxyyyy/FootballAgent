# ⚽ Football Agent - Docker Compose 编排文件
# 启动命令: docker-compose up -d
# 所有服务通过内部网络 football_net 互联，外部仅暴露必要端口

services:
  # ---------- MySQL 关系数据库 ----------
  mysql:
    image: mysql:8.0
    container_name: football_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-football123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-football_agent}
      MYSQL_CHARSET: utf8mb4
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./configs/mysql_schema.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - football_net

  # ---------- Neo4j 图数据库 ----------
  neo4j:
    image: neo4j:5.26-community
    container_name: football_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-football123}
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
    ports:
      - "127.0.0.1:7474:7474"   # Web 管理界面
      - "127.0.0.1:7687:7687"   # Bolt 协议
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - football_net

  # ---------- Redis 缓存 ----------
  redis:
    image: redis:7-alpine
    container_name: football_redis
    restart: always
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - football_net

  # ---------- OpenClaw 爬虫服务 ----------
  openclaw:
    build:
      context: ./docker/openclaw
      dockerfile: Dockerfile
    container_name: football_openclaw
    restart: always
    environment:
      - OPENCLAW_PORT=9000
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-}
      - ODDS_LOOP_INTERVAL=${ODDS_LOOP_INTERVAL:-900}
      - WORLDCUP_SCORE_URL=${WORLDCUP_SCORE_URL:-https://2026.titan007.com/}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=Asia/Shanghai
      - BARK_ENABLED=${BARK_ENABLED:-true}
      - BARK_KEY=${BARK_KEY:-}
      # 容器间通过 football_net 网络的服务名访问数据库
      - MYSQL_HOST=football_mysql
      - NEO4J_URL=bolt://football_neo4j:7687
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-football123}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-football_agent}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-football123}
    ports:
      - "127.0.0.1:${OPENCLAW_PORT:-9000}:9000"
    # Linux 下让容器能用 host.docker.internal 访问主机的预测服务(8000)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openclaw_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - football_net

  # ---------- Milvus 向量数据库（可选，按需启用） ----------
  # milvus:
