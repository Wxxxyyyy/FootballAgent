  #     - football_net

  # ---------- RabbitMQ 消息队列（后期按需启用） ----------
  # rabbitmq:
  #   image: rabbitmq:3-management-alpine
  #   container_name: football_rabbitmq
  #   restart: always
  #   environment:
  #     RABBITMQ_DEFAULT_USER: ${MQ_USER:-football}
  #     RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD:-football123}
  #   ports:
  #     - "127.0.0.1:5672:5672"    # AMQP 协议
  #     - "127.0.0.1:15672:15672"  # 管理界面
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq
  #   healthcheck:
  #     test: ["CMD", "rabbitmq-diagnostics", "check_running"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 5
  #   networks:
  #     - football_net

networks:
  football_net:
    driver: bridge

volumes:
  mysql_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  openclaw_data:
  # milvus_data:
  # rabbitmq_data:
